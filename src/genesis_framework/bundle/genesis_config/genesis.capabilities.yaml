version: 3.1.0
status_values: [supported, partial, runtime-only, manual, unsupported, blocked]

platforms:
  mendix:
    extractor: Mendix Model SDK
    confidence: high
    agent: mendix_extractor_agent
    capabilities:
      domain_models: supported
      pages: supported
      microflows: supported
      nanoflows: supported
      security: partial
      custom_java: manual

  powerapps:
    extractor: Power Platform CLI / Git integration / Src/*.pa.yaml + Power Fx

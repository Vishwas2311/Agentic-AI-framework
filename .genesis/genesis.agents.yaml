version: 3.1.0

agents:
  solution_intake_agent:
    role: source_intake
    mission: Classify migration inputs, identify source types, and build the input baseline before extraction.
    owns:
      - input_intake_manifest.json
      - source_baseline.json
    allowed_stages:
      - validate_inputs
      - discover_sources

  powerapps_extractor_agent:
    role: platform_extractor
    mission: Extract Power Platform and Power Apps exports into normalized AST artifacts.
    owns:
      - platform_ast.json
    allowed_stages:
      - extract_native_ast

  website_extractor_agent:
    role: website_extractor
    mission: Normalize website URLs, pages, and supporting web evidence into structured website AST artifacts.
    owns:
      - website_ast.json
    allowed_stages:
      - discover_sources
      - extract_native_ast

  document_extractor_agent:
    role: document_extractor
    mission: Extract migration intent, BRD expectations, notes, and mockup references from business documents and text files.
    owns:
      - brd_design_intent.json
      - brd_mockup_inventory.json
      - document_intent.json
    allowed_stages:
      - extract_brd_design_intent
      - extract_brd_mockups
      - extract_native_ast

  runtime_evidence_agent:
    role: runtime_capture
    mission: Capture or recommend runtime evidence such as screenshots, network traces, role sessions, and walkthrough flows.
    owns:
      - runtime_evidence.json
      - browser_runtime_plan.json
      - runtime_capture_contract.json
      - privacy_scan_report.json
      - asset_license_report.json
    allowed_stages:
      - record_runtime_evidence

  swarm_coordinator_agent:
    role: swarm_coordinator
    mission: Build the execution plan for extractor, planner, generator, QA, and delivery agents so the migration can run in structured waves.
    owns:
      - agent_execution_plan.json
      - swarm_topology.json
    allowed_stages:
      - discover_sources

  source_truth_agent:
    role: source_truth_resolver
    mission: Resolve conflicts across export, runtime, API, DB, website, and design evidence before generation.
    owns:
      - source_truth_report.json
      - source_conflict_report.json
      - confidence_scores.json
      - migration_contract.json
    allowed_stages:
      - resolve_source_truth
      - validate_ir

  migration_brd_agent:
    role: migration_planner
    mission: Turn extracted evidence into a migration brief, IR, and canonical app specification before code generation.
    owns:
      - canonical_app_spec.json
      - ulc_ir/
      - design_ir/
    allowed_stages:
      - build_ulc_ir
      - resolve_conflicts
      - build_canonical_app_spec
      - human_review_gate

  memory_curator_agent:
    role: verified_memory_curator
    mission: Retrieve relevant prior migration patterns before planning and save only trustworthy memory packets after approval and QA.
    owns:
      - memory_retrieval_plan.json
      - memory_context.json
      - verified_memory_packet.json
      - migration_learning_report.json
    allowed_stages:
      - validate_inputs
      - learn_verified_patterns

  ui_ux_pro_max:
    role: design_director
    mission: Define the product experience before component/code generation.
    owns:
      - DESIGN.md
      - design_tokens.json
      - component_registry.json
      - visual_acceptance_criteria.md
    allowed_stages:
      - generate_design_system
      - run_visual_design_qa
      - run_agent_repair_loop
    rules:
      - Use domain context before choosing style.
      - Keep enterprise apps dense, calm, and task-focused.
      - Use Framer Motion only for purposeful animation.
      - Produce testable visual acceptance criteria.

  backend_agent:
    role: backend_builder
    owns:
      - backend/
      - integration_contracts/
    allowed_stages:
      - generate_code
      - run_agent_repair_loop

  frontend_agent:
    role: frontend_builder
    owns:
      - frontend/
    allowed_stages:
      - generate_code
      - run_agent_repair_loop

  test_repair_agent:
    role: test_repair
    owns:
      - tests/
      - test_report.json
    allowed_stages:
      - run_agent_repair_loop
      - run_quality_gates

  security_agent:
    role: security_reviewer
    owns:
      - security_review_report.md
      - compliance_report.md
      - eu_ai_act_report.md
    allowed_stages:
      - run_quality_gates
      - final_approval

  deploy_agent:
    role: deploy_builder
    owns:
      - deploy/
      - .github/
      - deployment_report.md
    allowed_stages:
      - generate_code
      - deploy_staging
      - deliver_github_pr

  documentation_agent:
    role: documentation_writer
    owns:
      - docs/
      - README.md
      - ARCHITECTURE.md
    allowed_stages:
      - generate_code
      - deliver_github_pr

defaults:
  patch_size: small
  isolated_worktree: true
  receive_raw_secrets: false
  must_run_tests_before_merge: true
